name: Publish Docker image

on:
  push:
    tags: ["v*"]

env:
  IMAGE_NAME: c-sellers/graphed-knowledge

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to custom registry
        if: ${{ secrets.DOCKER_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to GHCR
        if: ${{ secrets.DOCKER_REGISTRY == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry
        id: reg
        run: |
          if [ -n "${{ secrets.DOCKER_REGISTRY }}" ]; then
            echo "registry=${{ secrets.DOCKER_REGISTRY }}" >> "$GITHUB_OUTPUT"
          else
            echo "registry=ghcr.io" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.reg.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.reg.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
