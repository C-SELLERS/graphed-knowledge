name: Publish Docker image

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Determine registry
        id: reg
        run: |
          # GitHub: uses ghcr.io with GITHUB_TOKEN
          # Gitea: uses REGISTRY secret (e.g. git.goosu.net) with REGISTRY_USER/REGISTRY_TOKEN
          if [ -n "${{ secrets.REGISTRY }}" ]; then
            echo "url=${{ secrets.REGISTRY }}" >> "$GITHUB_OUTPUT"
            echo "user=${{ secrets.REGISTRY_USER }}" >> "$GITHUB_OUTPUT"
            echo "token=${{ secrets.REGISTRY_TOKEN }}" >> "$GITHUB_OUTPUT"
            echo "image=${{ secrets.REGISTRY }}/c-sellers/graphed-knowledge" >> "$GITHUB_OUTPUT"
          else
            echo "url=ghcr.io" >> "$GITHUB_OUTPUT"
            echo "user=${{ github.actor }}" >> "$GITHUB_OUTPUT"
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
            echo "image=ghcr.io/c-sellers/graphed-knowledge" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.url }}
          username: ${{ steps.reg.outputs.user }}
          password: ${{ steps.reg.outputs.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.reg.outputs.image }}:latest
            ${{ steps.reg.outputs.image }}:${{ github.ref_name }}
