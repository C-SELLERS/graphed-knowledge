name: Publish Docker image

on:
  push:
    tags: ["v*"]

env:
  # Set DOCKER_REGISTRY as a repo variable to override the default (ghcr.io)
  # GitHub: leave unset → ghcr.io + GITHUB_TOKEN
  # Gitea: set DOCKER_REGISTRY=git.goosu.net, plus DOCKER_USER and DOCKER_TOKEN secrets
  REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_REGISTRY && secrets.DOCKER_USER || github.actor }}
          password: ${{ vars.DOCKER_REGISTRY && secrets.DOCKER_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/c-sellers/graphed-knowledge:latest
            ${{ env.REGISTRY }}/c-sellers/graphed-knowledge:${{ github.ref_name }}
